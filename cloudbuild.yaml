steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--build-arg', 'VITE_GEMINI_API_KEY=$_GEMINI_API_KEY',
      '--build-arg', 'VITE_FIREBASE_API_KEY=$_FIREBASE_API_KEY',
      '--build-arg', 'VITE_FIREBASE_AUTH_DOMAIN=$_FIREBASE_AUTH_DOMAIN',
      '--build-arg', 'VITE_FIREBASE_PROJECT_ID=$_FIREBASE_PROJECT_ID',
      '--build-arg', 'VITE_FIREBASE_STORAGE_BUCKET=$_FIREBASE_STORAGE_BUCKET',
      '--build-arg', 'VITE_FIREBASE_MESSAGING_SENDER_ID=$_FIREBASE_MESSAGING_SENDER_ID',
      '--build-arg', 'VITE_FIREBASE_APP_ID=$_FIREBASE_APP_ID',
      '-t', 'gcr.io/$PROJECT_ID/educonnect',
      '.'
    ]

  # 2. Push the image to Artifact Registry (or Container Registry)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/educonnect']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args: [
      'run', 'deploy', 'educonnect',
      '--image', 'gcr.io/$PROJECT_ID/educonnect',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--set-env-vars', 'VITE_GEMINI_API_KEY=$_GEMINI_API_KEY,VITE_FIREBASE_API_KEY=$_FIREBASE_API_KEY,VITE_FIREBASE_AUTH_DOMAIN=$_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_PROJECT_ID=$_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET=$_FIREBASE_STORAGE_BUCKET,VITE_FIREBASE_MESSAGING_SENDER_ID=$_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_APP_ID=$_FIREBASE_APP_ID'
    ]

images:
  - 'gcr.io/$PROJECT_ID/educonnect'

substitutions:
  _GEMINI_API_KEY: 'your-api-key-here' # Default value if not provided via CLI
  _FIREBASE_API_KEY: 'your-api-key-here'
  _FIREBASE_AUTH_DOMAIN: 'your-app.firebaseapp.com'
  _FIREBASE_PROJECT_ID: 'your-project-id'
  _FIREBASE_STORAGE_BUCKET: 'your-app.appspot.com'
  _FIREBASE_MESSAGING_SENDER_ID: 'your-sender-id'
  _FIREBASE_APP_ID: 'your-app-id'
